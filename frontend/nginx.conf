# AgenticFlow frontend — nginx server block (loaded from Dockerfile).
#
# Responsibilities:
# - Serve the React SPA with deep-link fallback (try_files → index.html).
# - Reverse-proxy /api, /metrics, /health to the backend service.
# - Add common hardening headers.
# - Aggressive cache for /assets/** (immutable, hashed filenames from Vite).

server {
    listen 80;
    server_name _;

    # Don't leak the nginx version.
    server_tokens off;

    # Security headers (app is single-tenant behind operator's own proxy).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # Ship the body as-is when the client accepts gzip.
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;
    gzip_min_length 1024;
    gzip_proxied any;

    # Hashed, content-addressable assets — safe to cache forever.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path renders the shell, client-side
    # router takes it from there.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------ API
    # Backend reachable via compose network DNS ("backend" service name).
    # Override with env if deploying outside compose.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        # Let long-running agent streams through.
        proxy_buffering off;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    location = /ready {
        proxy_pass http://backend:8000/ready;
        access_log off;
    }

    location = /metrics {
        proxy_pass http://backend:8000/metrics;
        # Allow Prometheus / operator to scrape; restrict at reverse-proxy layer if public.
    }

    # Reject hidden files (.env, .git, etc) just in case.
    location ~ /\. { deny all; }
}
