# gitleaks config for AgenticFlow.
# Extends the default rule set; adds a Ticimax-specific rule and allowlist
# entries for our documented placeholder patterns.

title = "AgenticFlow"

[extend]
# Inherit every rule from the default gitleaks ruleset.
useDefault = true

# --- Project-specific rule -------------------------------------------------
[[rules]]
id = "ticimax-uye-kodu"
description = "Ticimax üye kodu (32-char alphanumeric, 'FON'-prefixed)"
# Ticimax partner prefixes are public but the tail is the secret. Match
# any FON-prefixed 28+ alnum run. Allowlist (below) exempts the
# documented placeholder pattern `FONx...X`.
regex = '''\b(FON[0-9])([A-Za-z0-9]{28,40})\b'''
tags = ["ticimax", "credential"]

# --- Allowlist (documented placeholder patterns) --------------------------
[allowlist]
description = "Placeholders that look like credentials but are documented as examples"
regexes = [
  # Our public docs always use either an `X`-heavy placeholder…
  '''FONx[Xx]{10,}''',
  # …or the `FONxXXXXXXXXXXXXXXXXXXXXXXXXXX` convention (FONx + 28 X's).
  '''FONxXXXXXXXXXXXXXXXXXXXXXXXXXX''',
  # Test fixtures in tests/** use obviously-fake prefixes.
  '''sk-ant-super-secret''',
  '''ci-stub-(anthropic|google)''',
  '''TEST-UYE-KODU''',
]
paths = [
  # Test files, fixtures, and our own SECURITY incident narrative are
  # allowed to mention rotation/redaction patterns without triggering.
  '''backend/tests/.*''',
  '''docs/SECURITY_INCIDENT_.*\.md''',
  # Autogenerated Ticimax catalog — pure SOAP schema, no secrets.
  '''backend/app/nodes/ticimax/_auto_generated\.py''',
]
