name: Bug report
description: Report a defect that causes AgenticFlow to behave incorrectly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so the
        issue is actionable without a back-and-forth. For security issues,
        **do not** file here — see `SECURITY.md`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what is wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: |
        Minimal numbered steps. Include a workflow graph JSON if relevant.
      placeholder: |
        1. Create workflow with nodes [...]
        2. Click Run
        3. Observe error in step 3
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, and execution-step output if any.
      render: shell

  - type: input
    id: version
    attributes:
      label: AgenticFlow version
      placeholder: "e.g. v0.5.0 / commit SHA"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Backend (FastAPI / executor / scheduler)
        - Nodes (Ticimax)
        - Nodes (transform / logic / output / AI)
        - Frontend (canvas / config panel)
        - Frontend (chat / agent)
        - Database / migrations
        - CI / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, browser.
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.12.3
        - Node: 22.x
        - Browser: Chrome 138
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have redacted API keys, `uye_kodu`, and customer data from all logs/screenshots.
          required: true
