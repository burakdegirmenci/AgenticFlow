name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.6.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------- Backend sdist -------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend sdist
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir ../dist/backend

      # ----------------- Frontend production build -------------------------
      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Package frontend dist
        run: |
          mkdir -p dist/frontend
          tar -czf dist/frontend/agenticflow-frontend-${{ github.ref_name }}.tar.gz -C frontend dist

      # ----------------- Extract release notes -----------------------------
      - name: Extract changelog section for this tag
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          python - <<'PY' > release_notes.md
          import re, pathlib, os, sys
          version = os.environ.get("VERSION", "")
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)", text, re.S)
          print(m.group(1).strip() if m else f"_No CHANGELOG entry found for {version}._")
          PY
        env:
          VERSION: ${{ github.ref_name }}

      # ----------------- Create GitHub Release -----------------------------
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/backend/*
            dist/frontend/*
