name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Secret scan — gitleaks across the full repo history on every push.
  # Landed after the 2026-04-15 üye-kodu leak (see docs/SECURITY_INCIDENT_2026-04-15.md).
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can walk every commit

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for public repos; unset it for private.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "false"

  # ---------------------------------------------------------------------------
  # Backend: format, lint, type-check, tests, coverage gate
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Provide a stub MASTER_KEY for CI
        run: |
          echo "MASTER_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=ci-stub-anthropic" >> $GITHUB_ENV
          echo "GOOGLE_API_KEY=ci-stub-google" >> $GITHUB_ENV

      - name: Ruff — format check
        run: ruff format --check .

      - name: Ruff — lint
        run: ruff check .

      - name: MyPy — type check
        run: mypy app

      - name: Pytest — run suite with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Frontend: format, lint, type-check, tests, coverage
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier — format check
        run: npm run format:check

      - name: ESLint — lint
        run: npm run lint

      - name: TypeScript — type check
        run: npm run typecheck

      - name: Vitest — run suite with coverage
        run: npm run test:coverage

      - name: Vite build — production bundle
        run: npm run build

      - name: Upload coverage artifact
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 14
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Supply-chain audit — both ecosystems
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt --strict
        continue-on-error: true  # TODO(sprint-4): flip to hard fail once deps are clean.

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true  # TODO(sprint-4): flip to hard fail once deps are clean.

  # ---------------------------------------------------------------------------
  # Aggregate gate — lets branch protection require just one "CI" check.
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [secrets, backend, frontend, audit]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          echo "secrets=${{ needs.secrets.result }}"
          echo "backend=${{ needs.backend.result }}"
          echo "frontend=${{ needs.frontend.result }}"
          echo "audit=${{ needs.audit.result }}"
          if [[ "${{ needs.secrets.result }}"  != "success" ]]; then exit 1; fi
          if [[ "${{ needs.backend.result }}"  != "success" ]]; then exit 1; fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then exit 1; fi
          # audit is advisory in v0.x; do not fail the gate on it yet.
