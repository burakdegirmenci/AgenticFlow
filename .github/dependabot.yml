version: 2

updates:
  # -------------------------------------------------------------------------
  # Backend — Python dependencies
  # -------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # One PR per update category to keep reviews small.
      python-dev:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "pytest-*"
          - "freezegun"
          - "types-*"
      python-fastapi-stack:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
          - "python-multipart"
      python-db:
        patterns:
          - "sqlalchemy"
          - "alembic"
      python-llm:
        patterns:
          - "anthropic"
          - "google-genai"
    ignore:
      # Major bumps opened separately so we can review them with care.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # -------------------------------------------------------------------------
  # Frontend — npm dependencies
  # -------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "typescript-eslint"
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "prettier-*"
      testing:
        patterns:
          - "@testing-library/*"
          - "jsdom"
      reactflow-and-state:
        patterns:
          - "@xyflow/react"
          - "@tanstack/react-query"
          - "zustand"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # -------------------------------------------------------------------------
  # GitHub Actions themselves
  # -------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
